<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XLIIs T-Shirt Options</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #ccc; font-family: -apple-system, sans-serif; padding: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 24px; color: #eee; }
  .option { margin-bottom: 32px; }
  .label { font-size: 14px; color: #888; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
  .desc { font-size: 13px; color: #666; margin-bottom: 8px; }
  .preview { background: #1a1a1a; border-radius: 12px; padding: 20px; text-align: center; }
  .preview img { max-width: 100%; border-radius: 8px; }
</style>
</head><body>
<h1>XLIIs T-Shirt — Handwritten</h1>

<div class="option">
  <div class="label">1 — Sharpie marker</div>
  <div class="desc">Layout split but spelling is right, handwriting is good</div>
  <div class="preview"><img src="tshirt-hand-1.png" alt="V1"></div>
</div>

<div class="option">
  <div class="label">2 — Ballpoint pen</div>
  <div class="desc">Missing an I in XLIIs — spelling wrong</div>
  <div class="preview"><img src="tshirt-hand-2.png" alt="V2"></div>
</div>

<div class="option">
  <div class="label">3 — Brushstroke / punk</div>
  <div class="desc">Characters changed but the drip/brush style is interesting</div>
  <div class="preview"><img src="tshirt-hand-3.png" alt="V3"></div>
</div>

</body></html>
