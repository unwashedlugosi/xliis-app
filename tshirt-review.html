<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XLIIs Business Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #222; color: #ccc; font-family: -apple-system, sans-serif; padding: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 24px; color: #eee; }
  .option { margin-bottom: 28px; }
  .label { font-size: 14px; color: #999; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; text-align: center; }
  .preview { text-align: center; }
  .preview img { max-width: 100%; max-width: 500px; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
</style>
</head><body>
<h1>Business Card Options</h1>

<div class="option">
  <div class="label">1 — Black + Cream</div>
  <div class="preview"><img src="card-1.png" alt="Black + Cream"></div>
</div>

<div class="option">
  <div class="label">2 — Dark Navy + White</div>
  <div class="preview"><img src="card-2.png" alt="Dark Navy + White"></div>
</div>

<div class="option">
  <div class="label">3 — Cream + Dark Ink</div>
  <div class="preview"><img src="card-3.png" alt="Cream + Dark Ink"></div>
</div>

<div class="option">
  <div class="label">4 — Warm Charcoal + Gold</div>
  <div class="preview"><img src="card-4.png" alt="Warm Charcoal + Gold"></div>
</div>

</body></html>
