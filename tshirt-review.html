<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XLIIs T-Shirt Options</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #ccc; font-family: -apple-system, sans-serif; padding: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 24px; color: #eee; }
  .option { margin-bottom: 32px; }
  .label { font-size: 14px; color: #888; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
  .preview { background: #1a1a1a; border-radius: 12px; padding: 20px; text-align: center; }
  .preview img { max-width: 100%; border-radius: 8px; }
  .on-shirt { margin-top: 12px; }
  .on-shirt .shirt { background: #222; border-radius: 12px; padding: 40px 20px; text-align: center; }
  .on-shirt .shirt img { max-width: 280px; }
  .on-shirt .shirt.white { background: #f0ede6; }
  .on-shirt .shirt.black { background: #111; }
</style>
</head><body>
<h1>T-Shirt Design Options</h1>

<div class="option">
  <div class="label">V1 — White on transparent (for dark shirts)</div>
  <div class="on-shirt"><div class="shirt black">
    <img src="tshirt-v1.png" alt="V1">
  </div></div>
</div>

<div class="option">
  <div class="label">V2 — Cream stamp on black (heaviest texture)</div>
  <div class="preview">
    <img src="tshirt-v2.png" alt="V2">
  </div>
</div>

<div class="option">
  <div class="label">V3 — CRT green on black</div>
  <div class="preview">
    <img src="tshirt-v3.png" alt="V3">
  </div>
</div>

<div class="option">
  <div class="label">Original stamp artwork (for reference)</div>
  <div class="preview">
    <img src="stamps/all-four.png" alt="Original">
  </div>
</div>

</body></html>
