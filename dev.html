<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XLIIs — Mission Control</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #33ff33;
    --green-dim: #1a8a1a;
    --green-faint: rgba(51, 255, 51, 0.08);
    --green-glow: rgba(51, 255, 51, 0.4);
    --amber: #ffaa33;
    --amber-dim: #8a6a1a;
    --red: #ff4444;
    --bg: #0a0a14;
    --panel-bg: rgba(51, 255, 51, 0.02);
    --border: rgba(51, 255, 51, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', 'VT323', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 14px;
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  .header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-title {
    font-family: 'VT323', monospace;
    font-size: 28px;
    letter-spacing: 3px;
    text-shadow: 0 0 12px var(--green-glow);
  }
  .header-status {
    font-size: 12px;
    color: var(--green-dim);
    letter-spacing: 1px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--green-dim);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .refresh-btn:hover {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 8px rgba(51,255,51,0.15);
  }
  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    grid-template-rows: auto auto 1fr;
    gap: 1px;
    padding: 1px;
    background: rgba(51,255,51,0.06);
    min-height: calc(100vh - 62px);
  }

  .panel {
    background: var(--bg);
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .panel-label {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-label::before {
    content: '■';
    font-size: 6px;
  }

  /* ── STAT CARDS (top row) ── */
  .stat-card {
    grid-column: span 1;
  }
  .stat-value {
    font-family: 'VT323', monospace;
    font-size: 48px;
    line-height: 1;
    text-shadow: 0 0 16px var(--green-glow);
    margin-bottom: 4px;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--green-dim);
  }
  .stat-value.amber { color: var(--amber); text-shadow: 0 0 16px rgba(255,170,51,0.4); }
  .stat-sub.amber { color: var(--amber-dim); }

  /* ── COLLECTION BARS ── */
  .collections-panel {
    grid-column: span 2;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .bar-label {
    font-size: 12px;
    color: var(--green-dim);
    width: 140px;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-track {
    flex: 1;
    height: 20px;
    background: var(--green-faint);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, rgba(51,255,51,0.3), rgba(51,255,51,0.6));
    border-radius: 2px;
    transition: width 0.6s ease;
    box-shadow: inset 0 0 8px rgba(51,255,51,0.2);
  }
  .bar-count {
    font-size: 13px;
    width: 40px;
    text-align: right;
    color: var(--green);
  }

  /* ── ACTIVITY TIMELINE (sparkline) ── */
  .timeline-panel {
    grid-column: span 2;
  }
  .sparkline-container {
    height: 120px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    padding-top: 8px;
  }
  .spark-bar {
    flex: 1;
    min-width: 4px;
    background: linear-gradient(180deg, rgba(51,255,51,0.7), rgba(51,255,51,0.2));
    border-radius: 1px 1px 0 0;
    transition: height 0.4s ease;
    position: relative;
  }
  .spark-bar:hover {
    background: linear-gradient(180deg, rgba(51,255,51,1), rgba(51,255,51,0.5));
    box-shadow: 0 0 6px rgba(51,255,51,0.4);
  }
  .spark-bar:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    border: 1px solid var(--border);
    padding: 3px 8px;
    font-size: 11px;
    white-space: nowrap;
    border-radius: 3px;
    z-index: 10;
  }
  .timeline-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: rgba(51,255,51,0.3);
  }

  /* ── TOP SHOWS ── */
  .top-shows-panel {
    grid-column: span 2;
  }
  .show-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(51,255,51,0.04);
    font-size: 13px;
  }
  .show-rank {
    color: var(--green-dim);
    width: 20px;
    text-align: right;
    font-size: 11px;
  }
  .show-id {
    flex: 1;
    color: var(--green);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .show-plays {
    color: var(--green-dim);
    font-size: 12px;
  }

  /* ── EVENT LOG ── */
  .event-log-panel {
    grid-column: span 2;
  }
  .event-log {
    max-height: 400px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(51,255,51,0.2) transparent;
  }
  .event-log::-webkit-scrollbar { width: 4px; }
  .event-log::-webkit-scrollbar-thumb { background: rgba(51,255,51,0.2); border-radius: 2px; }
  .event-row {
    display: flex;
    gap: 10px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(51,255,51,0.03);
    font-size: 12px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .event-time {
    color: rgba(51,255,51,0.3);
    white-space: nowrap;
    font-size: 11px;
    min-width: 70px;
  }
  .event-type {
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .event-type.app_open { background: rgba(51,255,51,0.1); color: var(--green-dim); }
  .event-type.show_play { background: rgba(255,170,51,0.12); color: var(--amber); }
  .event-type.collection_switch { background: rgba(100,100,255,0.12); color: #8888ff; }
  .event-detail {
    color: rgba(51,255,51,0.5);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    color: var(--green-dim);
    font-size: 13px;
    padding: 20px 0;
    text-align: center;
    letter-spacing: 1px;
  }

  /* ── LOADING ── */
  .loading {
    color: var(--green-dim);
    font-size: 13px;
    animation: blink-load 1s step-end infinite;
  }
  @keyframes blink-load {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .dashboard {
      grid-template-columns: 1fr 1fr;
    }
    .stat-card { grid-column: span 1; }
    .collections-panel,
    .timeline-panel,
    .top-shows-panel,
    .event-log-panel { grid-column: span 2; }
  }
  @media (max-width: 500px) {
    .dashboard { grid-template-columns: 1fr; }
    .stat-card,
    .collections-panel,
    .timeline-panel,
    .top-shows-panel,
    .event-log-panel { grid-column: span 1; }
    .stat-value { font-size: 36px; }
    .header { padding: 12px 16px; }
    .panel { padding: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">XLIIs MISSION CONTROL</div>
    <div class="header-status" id="last-updated">LOADING...</div>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <button class="refresh-btn" onclick="loadAll()">REFRESH</button>
  </div>
</div>

<div class="dashboard">
  <!-- Row 1: Stat cards -->
  <div class="panel stat-card">
    <div class="panel-label">Total Opens</div>
    <div class="stat-value" id="total-opens">-</div>
    <div class="stat-sub" id="unique-devices">- devices</div>
  </div>
  <div class="panel stat-card">
    <div class="panel-label">Shows Played</div>
    <div class="stat-value amber" id="total-plays">-</div>
    <div class="stat-sub amber" id="unique-shows">- unique</div>
  </div>
  <div class="panel stat-card">
    <div class="panel-label">Today</div>
    <div class="stat-value" id="today-events">-</div>
    <div class="stat-sub" id="today-label">events today</div>
  </div>
  <div class="panel stat-card">
    <div class="panel-label">This Week</div>
    <div class="stat-value" id="week-events">-</div>
    <div class="stat-sub" id="week-devices">- devices</div>
  </div>

  <!-- Row 2: Collections + Timeline -->
  <div class="panel collections-panel">
    <div class="panel-label">Collection Popularity</div>
    <div id="collection-bars"><div class="loading">QUERYING...</div></div>
  </div>
  <div class="panel timeline-panel">
    <div class="panel-label">Activity — Last 30 Days</div>
    <div class="sparkline-container" id="sparkline"></div>
    <div class="timeline-labels" id="timeline-labels"></div>
  </div>

  <!-- Row 3: Top Shows + Event Log -->
  <div class="panel top-shows-panel">
    <div class="panel-label">Most Played Shows</div>
    <div id="top-shows"><div class="loading">QUERYING...</div></div>
  </div>
  <div class="panel event-log-panel">
    <div class="panel-label">Live Event Log</div>
    <div class="event-log" id="event-log"><div class="loading">QUERYING...</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://dhwllgdxpeucldtmzhme.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRod2xsZ2R4cGV1Y2xkdG16aG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMzI2NTMsImV4cCI6MjA4NTgwODY1M30.PmDxpoWXP0zA2sJLgRxAfODH1JcjdFOoRMdnGZwJYLE';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const COLLECTION_NAMES = {
    cornell_and_company: 'Cornell & Company',
    wall_of_sound: 'Wall of Sound',
    young_bettys: 'Young Bettys',
    new_animal: 'New Animal'
  };

  function formatTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
  }

  async function fetchAll() {
    const { data, error } = await sb
      .from('xlii_analytics')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(5000);
    if (error) {
      console.error('Fetch error:', error);
      return [];
    }
    return data || [];
  }

  function computeStats(rows) {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const weekStart = new Date(todayStart);
    weekStart.setDate(weekStart.getDate() - 7);

    const opens = rows.filter(r => r.event === 'app_open');
    const plays = rows.filter(r => r.event === 'show_play');
    const todayRows = rows.filter(r => new Date(r.created_at) >= todayStart);
    const weekRows = rows.filter(r => new Date(r.created_at) >= weekStart);

    const uniqueDevices = new Set(rows.map(r => r.device_id).filter(Boolean));
    const uniqueShows = new Set(plays.map(r => r.show_id).filter(Boolean));
    const weekDevices = new Set(weekRows.map(r => r.device_id).filter(Boolean));

    // Collection counts
    const collectionCounts = {};
    rows.forEach(r => {
      const c = r.collection || (r.metadata?.collection);
      if (c) collectionCounts[c] = (collectionCounts[c] || 0) + 1;
    });

    // Show play counts
    const showCounts = {};
    plays.forEach(r => {
      if (r.show_id) {
        const label = r.metadata?.venue
          ? `${r.metadata.date || ''} ${r.metadata.venue}`.trim()
          : r.show_id;
        if (!showCounts[r.show_id]) showCounts[r.show_id] = { count: 0, label };
        showCounts[r.show_id].count++;
      }
    });

    // Daily activity for last 30 days
    const dailyCounts = {};
    for (let i = 29; i >= 0; i--) {
      const d = new Date(todayStart);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      dailyCounts[key] = 0;
    }
    rows.forEach(r => {
      const key = r.created_at?.slice(0, 10);
      if (key && key in dailyCounts) dailyCounts[key]++;
    });

    return {
      totalOpens: opens.length,
      totalPlays: plays.length,
      uniqueDevices: uniqueDevices.size,
      uniqueShows: uniqueShows.size,
      todayEvents: todayRows.length,
      weekEvents: weekRows.length,
      weekDevices: weekDevices.size,
      collectionCounts,
      showCounts,
      dailyCounts,
      recentEvents: rows.slice(0, 50)
    };
  }

  function render(stats) {
    // Stat cards
    document.getElementById('total-opens').textContent = stats.totalOpens;
    document.getElementById('unique-devices').textContent = stats.uniqueDevices + ' devices';
    document.getElementById('total-plays').textContent = stats.totalPlays;
    document.getElementById('unique-shows').textContent = stats.uniqueShows + ' unique';
    document.getElementById('today-events').textContent = stats.todayEvents;
    document.getElementById('week-events').textContent = stats.weekEvents;
    document.getElementById('week-devices').textContent = stats.weekDevices + ' devices';

    // Collection bars
    const maxC = Math.max(1, ...Object.values(stats.collectionCounts));
    const allCollections = Object.keys(COLLECTION_NAMES);
    let barsHtml = '';
    allCollections.forEach(c => {
      const count = stats.collectionCounts[c] || 0;
      const pct = (count / maxC * 100).toFixed(0);
      barsHtml += `<div class="bar-row">
        <span class="bar-label">${COLLECTION_NAMES[c] || c}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="bar-count">${count}</span>
      </div>`;
    });
    document.getElementById('collection-bars').innerHTML = barsHtml || '<div class="empty-state">NO DATA YET</div>';

    // Sparkline
    const days = Object.entries(stats.dailyCounts);
    const maxDay = Math.max(1, ...days.map(d => d[1]));
    const sparkEl = document.getElementById('sparkline');
    sparkEl.innerHTML = '';
    days.forEach(([date, count]) => {
      const bar = document.createElement('div');
      bar.className = 'spark-bar';
      const h = count === 0 ? 2 : Math.max(4, (count / maxDay) * 120);
      bar.style.height = h + 'px';
      const dayLabel = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      bar.setAttribute('data-tooltip', `${dayLabel}: ${count}`);
      sparkEl.appendChild(bar);
    });
    const labelsEl = document.getElementById('timeline-labels');
    if (days.length > 0) {
      const first = new Date(days[0][0] + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const last = new Date(days[days.length-1][0] + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      labelsEl.innerHTML = `<span>${first}</span><span>${last}</span>`;
    }

    // Top shows
    const showsSorted = Object.entries(stats.showCounts)
      .sort((a, b) => b[1].count - a[1].count)
      .slice(0, 12);
    let showsHtml = '';
    showsSorted.forEach(([id, info], i) => {
      showsHtml += `<div class="show-row">
        <span class="show-rank">${i + 1}.</span>
        <span class="show-id" title="${id}">${info.label}</span>
        <span class="show-plays">${info.count}x</span>
      </div>`;
    });
    document.getElementById('top-shows').innerHTML = showsHtml || '<div class="empty-state">NO SHOWS PLAYED YET</div>';

    // Event log
    let logHtml = '';
    stats.recentEvents.forEach(ev => {
      const detail = ev.event === 'show_play'
        ? (ev.metadata?.venue || ev.show_id || '')
        : ev.event === 'collection_switch'
        ? (COLLECTION_NAMES[ev.metadata?.collection] || ev.metadata?.collection || '')
        : (ev.metadata?.platform || '');
      logHtml += `<div class="event-row">
        <span class="event-time">${formatTime(ev.created_at)}</span>
        <span class="event-type ${ev.event}">${ev.event.replace(/_/g, ' ').toUpperCase()}</span>
        <span class="event-detail">${detail}</span>
      </div>`;
    });
    document.getElementById('event-log').innerHTML = logHtml || '<div class="empty-state">NO EVENTS RECORDED YET</div>';

    // Update timestamp
    document.getElementById('last-updated').textContent =
      'LAST REFRESH: ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  async function loadAll() {
    const rows = await fetchAll();
    const stats = computeStats(rows);
    render(stats);
  }

  // Initial load
  loadAll();

  // Auto-refresh every 60 seconds
  setInterval(loadAll, 60000);
</script>
</body>
</html>
