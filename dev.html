<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XLIIs — Dev Console</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #33ff33;
    --green-dim: #1a8a1a;
    --green-faint: rgba(51, 255, 51, 0.08);
    --green-glow: rgba(51, 255, 51, 0.4);
    --bg: #0a0a14;
    --amber: #ffaa33;
    --red: #ff4444;
    --cyan: #33ffee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', 'VT323', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0, 0, 0, 0.12) 2px, rgba(0, 0, 0, 0.12) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Phosphor glow on edges */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 999;
  }

  .shell {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 48px;
  }

  /* ─── HEADER ─── */
  .header {
    margin-bottom: 32px;
    border-bottom: 1px solid rgba(51, 255, 51, 0.15);
    padding-bottom: 16px;
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 {
    font-family: 'VT323', monospace;
    font-size: 32px;
    letter-spacing: 3px;
    text-shadow: 0 0 12px var(--green-glow);
  }
  .header-meta {
    font-size: 13px;
    color: var(--green-dim);
    letter-spacing: 1px;
  }
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-right: 6px;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ─── STAT CARDS ─── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    border: 1px solid rgba(51, 255, 51, 0.12);
    border-radius: 6px;
    padding: 16px;
    background: var(--green-faint);
    position: relative;
    overflow: hidden;
    animation: card-in 0.6s ease-out backwards;
  }
  .stat-card:nth-child(1) { animation-delay: 0.1s; }
  .stat-card:nth-child(2) { animation-delay: 0.2s; }
  .stat-card:nth-child(3) { animation-delay: 0.3s; }
  .stat-card:nth-child(4) { animation-delay: 0.4s; }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.4;
  }
  .stat-label {
    font-size: 11px;
    color: var(--green-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'VT323', monospace;
    font-size: 36px;
    line-height: 1;
    text-shadow: 0 0 8px var(--green-glow);
  }
  .stat-sub {
    font-size: 12px;
    color: var(--green-dim);
    margin-top: 4px;
  }

  /* ─── TWO COLUMN LAYOUT ─── */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  /* ─── PANELS ─── */
  .panel {
    border: 1px solid rgba(51, 255, 51, 0.12);
    border-radius: 6px;
    background: var(--green-faint);
    overflow: hidden;
    animation: card-in 0.6s ease-out backwards;
    animation-delay: 0.5s;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(51, 255, 51, 0.1);
    font-size: 12px;
    color: var(--green-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body {
    padding: 16px;
  }

  /* ─── COLLECTION BARS ─── */
  .collection-bar {
    margin-bottom: 12px;
  }
  .collection-bar:last-child { margin-bottom: 0; }
  .bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 4px;
  }
  .bar-label .name { color: var(--green); }
  .bar-label .count { color: var(--green-dim); }
  .bar-track {
    height: 18px;
    background: rgba(51, 255, 51, 0.04);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, rgba(51, 255, 51, 0.25), rgba(51, 255, 51, 0.45));
    border-radius: 2px;
    transition: width 1s ease-out;
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  /* ─── SPARKLINE ─── */
  .sparkline-container {
    height: 120px;
    position: relative;
  }
  .sparkline-canvas {
    width: 100%;
    height: 100%;
  }

  /* ─── TOP SHOWS ─── */
  .show-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid rgba(51, 255, 51, 0.05);
    font-size: 13px;
  }
  .show-row:last-child { border-bottom: none; }
  .show-rank {
    color: var(--green-dim);
    width: 24px;
    flex-shrink: 0;
  }
  .show-name {
    flex: 1;
    color: var(--green);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-right: 8px;
  }
  .show-plays {
    color: var(--green-dim);
    flex-shrink: 0;
  }

  /* ─── EVENT LOG ─── */
  .event-log {
    margin-bottom: 0;
  }
  .log-table {
    width: 100%;
    font-size: 12px;
  }
  .log-row {
    display: grid;
    grid-template-columns: 140px 100px 1fr 80px;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(51, 255, 51, 0.04);
    align-items: baseline;
  }
  .log-row:last-child { border-bottom: none; }
  .log-time { color: rgba(51, 255, 51, 0.35); }
  .log-event { color: var(--green); }
  .log-event.open { color: var(--cyan); }
  .log-event.play { color: var(--amber); }
  .log-event.switch { color: var(--green); }
  .log-detail {
    color: var(--green-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .log-device {
    color: rgba(51, 255, 51, 0.25);
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── DEVICE PIE ─── */
  .device-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .device-ring {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
  }
  .device-legend {
    flex: 1;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .legend-dot.ios { background: var(--green); }
  .legend-dot.web { background: var(--cyan); }
  .legend-dot.unknown { background: var(--green-dim); }

  /* ─── EMPTY STATE ─── */
  .empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--green-dim);
    font-size: 14px;
  }
  .empty-icon {
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.4;
  }

  /* ─── REFRESH BAR ─── */
  .refresh-bar {
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: rgba(51, 255, 51, 0.25);
    letter-spacing: 1px;
  }
  .refresh-bar span { cursor: pointer; }
  .refresh-bar span:hover { color: var(--green); }

  /* ─── LOADING ─── */
  .loading {
    text-align: center;
    padding: 40px;
    font-size: 16px;
    color: var(--green-dim);
  }
  @keyframes blink-cursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .cursor-blink {
    display: inline-block;
    width: 10px;
    height: 16px;
    background: var(--green);
    vertical-align: middle;
    animation: blink-cursor 1s step-end infinite;
    margin-left: 4px;
  }

  /* ─── MOBILE ─── */
  @media (max-width: 700px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .columns { grid-template-columns: 1fr; }
    .stat-value { font-size: 28px; }
    .log-row { grid-template-columns: 90px 80px 1fr; }
    .log-device { display: none; }
    .shell { padding: 20px 16px 32px; }
  }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <div class="header-row">
      <h1>XLIIs DEV CONSOLE</h1>
      <div class="header-meta">
        <span class="status-dot"></span>LIVE — AUTO-REFRESH 60s
      </div>
    </div>
  </div>

  <div id="app">
    <div class="loading">LOADING TELEMETRY<span class="cursor-blink"></span></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dhwllgdxpeucldtmzhme.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRod2xsZ2R4cGV1Y2xkdG16aG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMzI2NTMsImV4cCI6MjA4NTgwODY1M30.PmDxpoWXP0zA2sJLgRxAfODH1JcjdFOoRMdnGZwJYLE';

const COLLECTION_NAMES = {
  cornell_and_company: 'Cornell & Company',
  wall_of_sound: 'Six Hundred Four',
  young_bettys: 'Young Bettys',
  new_animal: 'New Animal',
};

async function query(table, params = '') {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${params}`;
  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'count=exact',
    },
  });
  const total = res.headers.get('content-range');
  const data = await res.json();
  const count = total ? parseInt(total.split('/')[1]) || data.length : data.length;
  return { data, count };
}

function formatTime(dateStr) {
  const d = new Date(dateStr);
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const da = String(d.getDate()).padStart(2, '0');
  const hr = String(d.getHours()).padStart(2, '0');
  const mn = String(d.getMinutes()).padStart(2, '0');
  const sc = String(d.getSeconds()).padStart(2, '0');
  return `${mo}-${da} ${hr}:${mn}:${sc}`;
}

function drawSparkline(canvas, dailyCounts, labels) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  const max = Math.max(1, ...dailyCounts);
  const pad = { top: 8, bottom: 20, left: 4, right: 4 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  const barW = Math.max(2, (plotW / dailyCounts.length) - 2);

  // Grid lines
  ctx.strokeStyle = 'rgba(51, 255, 51, 0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (plotH / 3) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
  }

  // Bars
  dailyCounts.forEach((count, i) => {
    const x = pad.left + (i / dailyCounts.length) * plotW + 1;
    const h = (count / max) * plotH;
    const y = pad.top + plotH - h;

    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, 'rgba(51, 255, 51, 0.5)');
    grad.addColorStop(1, 'rgba(51, 255, 51, 0.15)');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, barW, h);

    if (count > 0) {
      ctx.fillStyle = 'rgba(51, 255, 51, 0.8)';
      ctx.fillRect(x, y, barW, 1.5);
    }
  });

  // Date labels
  ctx.fillStyle = 'rgba(51, 255, 51, 0.25)';
  ctx.font = '10px "Share Tech Mono", monospace';
  if (labels.length >= 3) {
    ctx.textAlign = 'left';
    ctx.fillText(labels[0], pad.left, H - 4);
    ctx.textAlign = 'center';
    ctx.fillText(labels[1], W / 2, H - 4);
    ctx.textAlign = 'right';
    ctx.fillText(labels[2], W - pad.right, H - 4);
  }
}

function drawRing(canvas, segments) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 80 * dpr;
  canvas.height = 80 * dpr;
  ctx.scale(dpr, dpr);

  const cx = 40, cy = 40, r = 30, lw = 10;
  const total = segments.reduce((a, b) => a + b.value, 0) || 1;
  let angle = -Math.PI / 2;

  segments.forEach(seg => {
    const sweep = (seg.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, angle, angle + sweep);
    ctx.strokeStyle = seg.color;
    ctx.lineWidth = lw;
    ctx.lineCap = 'butt';
    ctx.stroke();
    angle += sweep;
  });

  ctx.fillStyle = '#33ff33';
  ctx.font = '18px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy);
}

async function loadDashboard() {
  const { data: events, count: totalEvents } = await query('xlii_analytics', 'select=*&order=created_at.desc&limit=1000');

  // Stats
  const uniqueDevices = new Set(events.map(e => e.device_id)).size;
  const opens = events.filter(e => e.event === 'app_open').length;
  const plays = events.filter(e => e.event === 'show_play').length;

  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const tomorrowStart = new Date(todayStart.getTime() + 86400000);
  const todayEvents = events.filter(e => {
    const d = new Date(e.created_at);
    return d >= todayStart && d < tomorrowStart;
  }).length;

  const weekAgo = new Date(now - 7 * 86400000);
  const weekEvents = events.filter(e => new Date(e.created_at) >= weekAgo).length;

  // Collection popularity
  const collectionCounts = {};
  events.forEach(e => {
    if (e.collection) collectionCounts[e.collection] = (collectionCounts[e.collection] || 0) + 1;
  });
  const maxCollection = Math.max(1, ...Object.values(collectionCounts));

  // Daily activity (last 30 days)
  const dailyCounts = [];
  const dailyLabels = [];
  for (let i = 29; i >= 0; i--) {
    const dayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
    const dayEnd = new Date(dayStart.getTime() + 86400000);
    const key = `${String(dayStart.getMonth()+1).padStart(2,'0')}-${String(dayStart.getDate()).padStart(2,'0')}`;
    dailyCounts.push(events.filter(e => {
      const d = new Date(e.created_at);
      return d >= dayStart && d < dayEnd;
    }).length);
    if (i === 29 || i === 14 || i === 0) dailyLabels.push(key);
  }

  // Top shows
  const showCounts = {};
  events.filter(e => e.event === 'show_play' && e.show_id).forEach(e => {
    showCounts[e.show_id] = (showCounts[e.show_id] || 0) + 1;
  });
  const topShows = Object.entries(showCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);

  // Platform breakdown
  let iosCount = 0, webCount = 0, otherCount = 0;
  events.forEach(e => {
    const p = e.metadata?.platform;
    if (p === 'ios' || p === 'carplay') iosCount++;
    else if (p === 'web') webCount++;
    else otherCount++;
  });

  const recentEvents = events.slice(0, 25);

  // RENDER
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Events</div>
        <div class="stat-value">${totalEvents}</div>
        <div class="stat-sub">${todayEvents} today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unique Devices</div>
        <div class="stat-value">${uniqueDevices}</div>
        <div class="stat-sub">${opens} opens</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Shows Played</div>
        <div class="stat-value">${plays}</div>
        <div class="stat-sub">${Object.keys(showCounts).length} unique</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Week</div>
        <div class="stat-value">${weekEvents}</div>
        <div class="stat-sub">last 7 days</div>
      </div>
    </div>

    <div class="columns">
      <div class="panel" style="animation-delay:0.5s">
        <div class="panel-header"><span>30-Day Activity</span><span>${events.length} total</span></div>
        <div class="panel-body">
          <div class="sparkline-container"><canvas class="sparkline-canvas" id="sparkline"></canvas></div>
        </div>
      </div>
      <div class="panel" style="animation-delay:0.6s">
        <div class="panel-header"><span>Collections</span><span>all events</span></div>
        <div class="panel-body">
          ${Object.entries(COLLECTION_NAMES).map(([id, name]) => {
            const count = collectionCounts[id] || 0;
            const pct = (count / maxCollection * 100).toFixed(0);
            return `<div class="collection-bar">
              <div class="bar-label"><span class="name">${name}</span><span class="count">${count}</span></div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="columns">
      <div class="panel" style="animation-delay:0.7s">
        <div class="panel-header"><span>Top Shows</span><span>by plays</span></div>
        <div class="panel-body">
          ${topShows.length === 0
            ? '<div class="empty"><div class="empty-icon">~</div>No plays yet</div>'
            : topShows.map(([id, count], i) => {
                const short = id.replace(/gd(\d{4})-?(\d{2})-?(\d{2}).*/, '$1-$2-$3');
                return `<div class="show-row">
                  <span class="show-rank">${i+1}.</span>
                  <span class="show-name" title="${id}">${short}</span>
                  <span class="show-plays">${count} play${count>1?'s':''}</span>
                </div>`;
              }).join('')}
        </div>
      </div>
      <div class="panel" style="animation-delay:0.8s">
        <div class="panel-header"><span>Platforms</span><span>${events.length} events</span></div>
        <div class="panel-body">
          <div class="device-stats">
            <canvas class="device-ring" id="device-ring" width="80" height="80"></canvas>
            <div class="device-legend">
              <div class="legend-item"><span class="legend-dot ios"></span><span>iOS / CarPlay — ${iosCount}</span></div>
              <div class="legend-item"><span class="legend-dot web"></span><span>Web — ${webCount}</span></div>
              ${otherCount > 0 ? `<div class="legend-item"><span class="legend-dot unknown"></span><span>Other — ${otherCount}</span></div>` : ''}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" style="animation-delay:0.9s;margin-top:16px;">
      <div class="panel-header"><span>Event Log</span><span>latest ${recentEvents.length}</span></div>
      <div class="panel-body event-log">
        <div class="log-table">
          ${recentEvents.map(e => {
            const evtClass = e.event === 'app_open' ? 'open' : e.event === 'show_play' ? 'play' : 'switch';
            const evtLabel = e.event.replace('_', ' ').toUpperCase();
            const detail = e.event === 'show_play'
              ? (e.show_id || '').replace(/gd(\d{4})-?(\d{2})-?(\d{2}).*/, '$1-$2-$3')
              : (COLLECTION_NAMES[e.collection] || e.collection || '\u2014');
            const shortDevice = (e.device_id || '').slice(-8);
            return `<div class="log-row">
              <span class="log-time">${formatTime(e.created_at)}</span>
              <span class="log-event ${evtClass}">${evtLabel}</span>
              <span class="log-detail">${detail}</span>
              <span class="log-device">${shortDevice}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="refresh-bar">
      <span onclick="loadDashboard()">REFRESH NOW</span> — next auto-refresh in <span id="countdown">60</span>s
    </div>
  `;

  requestAnimationFrame(() => {
    const sparkCanvas = document.getElementById('sparkline');
    if (sparkCanvas) drawSparkline(sparkCanvas, dailyCounts, dailyLabels);
    const ringCanvas = document.getElementById('device-ring');
    if (ringCanvas) {
      drawRing(ringCanvas, [
        { value: iosCount, color: '#33ff33' },
        { value: webCount, color: '#33ffee' },
        { value: otherCount, color: '#1a8a1a' },
      ].filter(s => s.value > 0));
    }
  });
}

let countdown = 60;
setInterval(() => {
  countdown--;
  const el = document.getElementById('countdown');
  if (el) el.textContent = countdown;
  if (countdown <= 0) { countdown = 60; loadDashboard(); }
}, 1000);

loadDashboard().catch(err => {
  document.getElementById('app').innerHTML = `
    <div class="empty" style="padding:60px 20px;">
      <div class="empty-icon">!</div>
      <div>Failed to load telemetry</div>
      <div style="margin-top:8px;font-size:12px;color:rgba(51,255,51,0.3);">${err.message}</div>
    </div>`;
});
</script>
</body>
</html>
