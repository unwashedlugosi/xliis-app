<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XLIIs — Contact</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    color: #33ff33;
    font-family: 'VT323', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 1000;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 60px 24px 40px;
  }
  h1 {
    font-size: 36px;
    letter-spacing: 3px;
    margin-bottom: 32px;
    text-shadow: 0 0 12px rgba(51, 255, 51, 0.4);
  }
  .section-label {
    font-size: 14px;
    color: #1a6a1a;
    letter-spacing: 3px;
    margin-bottom: 16px;
    margin-top: 40px;
    text-transform: uppercase;
    position: relative;
    padding-left: 18px;
  }
  .section-label:first-of-type { margin-top: 0; }
  .section-label::before {
    content: '>';
    position: absolute;
    left: 0;
  }
  p {
    font-size: 20px;
    line-height: 1.6;
    color: #22bb22;
    margin-bottom: 16px;
  }
  a {
    color: #33ff33;
    text-decoration: none;
    border-bottom: 1px solid rgba(51, 255, 51, 0.3);
  }
  a:hover { border-bottom-color: #33ff33; }
  .email-box {
    display: inline-block;
    border: 1px solid rgba(51, 255, 51, 0.25);
    border-radius: 8px;
    padding: 12px 20px;
    margin-bottom: 8px;
    font-size: 22px;
  }
  .email-box a { border-bottom: none; }
  form {
    margin-top: 16px;
  }
  label {
    display: block;
    font-size: 16px;
    color: #1a8a1a;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  input, textarea {
    width: 100%;
    background: rgba(51, 255, 51, 0.05);
    border: 1px solid rgba(51, 255, 51, 0.2);
    border-radius: 6px;
    color: #33ff33;
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 10px 12px;
    margin-bottom: 16px;
    outline: none;
  }
  input:focus, textarea:focus {
    border-color: rgba(51, 255, 51, 0.5);
    box-shadow: 0 0 8px rgba(51, 255, 51, 0.1);
  }
  input::placeholder, textarea::placeholder {
    color: #1a5a1a;
  }
  textarea {
    min-height: 120px;
    resize: vertical;
  }
  button {
    background: rgba(51, 255, 51, 0.1);
    border: 1px solid rgba(51, 255, 51, 0.3);
    border-radius: 6px;
    color: #33ff33;
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 10px 28px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s, border-color 0.2s;
  }
  button:hover {
    background: rgba(51, 255, 51, 0.18);
    border-color: #33ff33;
  }
  .success {
    display: none;
    font-size: 20px;
    color: #33ff33;
    margin-top: 16px;
  }
  .back {
    display: inline-block;
    margin-top: 40px;
    font-size: 18px;
    color: #1a6a1a;
    border-bottom: none;
  }
  .back:hover { color: #33ff33; }
  .back::before { content: '< '; }
  @media (max-width: 480px) {
    .container { padding: 40px 20px 32px; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="container">

  <h1>XLIIs — Contact</h1>

  <div class="section-label">Email</div>
  <p>The fastest way to reach us:</p>
  <div class="email-box">
    <a href="mailto:hello@xliis.app">hello@xliis.app</a>
  </div>

  <div class="section-label">Send a Message</div>
  <form id="contact-form" action="https://formspree.io/f/hello@xliis.app" method="POST">
    <label for="email">Your email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" placeholder="Feature request, bug report, or just saying hey..." required></textarea>

    <button type="submit">Send</button>
    <p class="success" id="success-msg">Message sent. We'll get back to you.</p>
  </form>

  <a href="/" class="back">Back to XLIIs</a>

</div>

<script>
  const form = document.getElementById('contact-form');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const data = new FormData(form);
    fetch(form.action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    }).then(r => {
      if (r.ok) {
        form.reset();
        document.getElementById('success-msg').style.display = 'block';
      }
    }).catch(() => {
      window.location.href = 'mailto:hello@xliis.app';
    });
  });
</script>
</body>
</html>
